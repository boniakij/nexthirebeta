version: '3.9'

services:
  app:
    build:
      context: ./api
      dockerfile: ../docker/php/Dockerfile
    container_name: nexthire-app
    working_dir: /var/www/html
    volumes:
      - ./api:/var/www/html
    depends_on:
      - db
      - redis
    networks:
      - nexthire

  nginx:
    image: nginx:1.25-alpine
    container_name: nexthire-nginx
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./api:/var/www/html
    depends_on:
      - app
    networks:
      - nexthire

  db:
    image: mysql:8.0
    container_name: nexthire-db
    environment:
      MYSQL_DATABASE: nexthire
      MYSQL_USER: nexthire
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - nexthire

  redis:
    image: redis:7-alpine
    container_name: nexthire-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - nexthire

  horizon:
    build:
      context: ./api
      dockerfile: ../docker/php/Dockerfile
    container_name: nexthire-horizon
    working_dir: /var/www/html
    command: php artisan horizon
    volumes:
      - ./api:/var/www/html
    depends_on:
      - db
      - redis
    networks:
      - nexthire

  scheduler:
    build:
      context: ./api
      dockerfile: ../docker/php/Dockerfile
    container_name: nexthire-scheduler
    working_dir: /var/www/html
    command: php artisan schedule:work
    volumes:
      - ./api:/var/www/html
    depends_on:
      - db
      - redis
    networks:
      - nexthire

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: nexthire-search
    ports:
      - "7700:7700"
    volumes:
      - search_data:/meili_data
    networks:
      - nexthire

volumes:
  db_data:
  redis_data:
  search_data:

networks:
  nexthire:
    driver: bridge
